name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      publish_release:
        description: Attach APK to a GitHub Release (only when run on a tag)
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve profile
        id: profile
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger and wait for EAS Android build
        id: eas_build
        shell: bash
        run: |
          eas build \
            --platform android \
            --profile "${{ steps.profile.outputs.value }}" \
            --non-interactive \
            --wait \
            --json > eas-build.json

      - name: Extract APK URL from EAS output
        id: apk
        run: |
          node -e "const fs=require('fs'); const raw=fs.readFileSync('eas-build.json','utf8'); const parsed=JSON.parse(raw); const build=Array.isArray(parsed)?parsed[0]:parsed; const url=build?.artifacts?.buildUrl || build?.artifacts?.applicationArchiveUrl; if(!url){console.error('No build artifact URL found in eas-build.json'); process.exit(1);} const out=process.env.GITHUB_OUTPUT; fs.appendFileSync(out, 'apk_url='+url+'\n'); fs.appendFileSync(out, 'build_id='+(build?.id || '')+'\n');"

      - name: Download APK
        shell: bash
        run: |
          curl -L "${{ steps.apk.outputs.apk_url }}" -o app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.publish_release == true)
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          generate_release_notes: true
