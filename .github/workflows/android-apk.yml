name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      publish_release:
        description: Attach APK to a GitHub Release
        required: false
        default: false
        type: boolean
permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve profile
        id: profile
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger and wait for EAS Android build
        id: eas_build
        shell: bash
        run: |
          eas build \
            --platform android \
            --profile "${{ steps.profile.outputs.value }}" \
            --non-interactive \
            --wait \
            --json > eas-build.json

      - name: Extract APK URL from EAS output
        id: apk
        run: |
          node -e "const fs=require('fs'); const raw=fs.readFileSync('eas-build.json','utf8'); const parsed=JSON.parse(raw); const build=Array.isArray(parsed)?parsed[0]:parsed; const url=build?.artifacts?.buildUrl || build?.artifacts?.applicationArchiveUrl; if(!url){console.error('No build artifact URL found in eas-build.json'); process.exit(1);} const out=process.env.GITHUB_OUTPUT; fs.appendFileSync(out, 'apk_url='+url+'\n'); fs.appendFileSync(out, 'build_id='+(build?.id || '')+'\n');"

      - name: Download APK
        shell: bash
        run: |
          curl -L "${{ steps.apk.outputs.apk_url }}" -o app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Compute release metadata
        id: release_meta
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            RELEASE_NAME="${TAG_NAME}"
            IS_PRERELEASE="false"
          else
            TAG_NAME="apk-run-${GITHUB_RUN_NUMBER}"
            RELEASE_NAME="Manual APK Build #${GITHUB_RUN_NUMBER}"
            IS_PRERELEASE="true"
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          files: app-release.apk
          generate_release_notes: true
